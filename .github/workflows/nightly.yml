name: Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: develop

      - name: Run Luacheck
        uses: nebularg/actions-luacheck@dd48c197053814ed6e9e73f34ac37051b48a4bbf # v1.1.2
        with:
          args: --no-color -q
          annotate: warning

      - name: Tag nightly
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.REPOSITORY_ACCESS_TOKEN }}
          script: |
            const fs = require("fs")
            const path = require("path")
            const { execSync } = require("child_process")
            const { owner, repo } = context.repo

            const currentSha = execSync("git rev-parse HEAD").toString().trim()

            const tags = await github.paginate(github.rest.repos.listTags, { owner, repo, per_page: 100 })
            const lastNightly = tags.find(t => t.name.includes("nightly"))
            if (lastNightly && lastNightly.commit.sha === currentSha) {
              core.info("No new commits since last nightly, skipping.")
              return
            }

            const sourceFile = path.join(process.env.GITHUB_WORKSPACE, "Aurora_Mainline.toc")
            const source = fs.readFileSync(sourceFile, "utf8")
            const match = source.match(/##\s*Version\s*:\s*(\d+\.\d+\.\d+\.\d+)/)
            if (!match) {
              core.setFailed("Unable to find addon version in Aurora_Mainline.toc")
              return
            }

            const version = match[1]
            const date = new Date().toISOString().slice(0, 10).replace(/-/g, "")
            const tagName = `${version}-nightly-${date}`

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tagName}` })
              core.info(`Tag ${tagName} already exists, skipping.`)
              return
            } catch (e) {
              if (e.status !== 404) throw e
            }

            const tag = await github.rest.git.createTag({
              owner, repo,
              tag: tagName,
              message: "nightly",
              object: currentSha,
              type: "commit",
            })

            await github.rest.git.createRef({
              owner, repo,
              ref: `refs/tags/${tagName}`,
              sha: tag.data.sha,
            })

            core.info(`Created nightly tag ${tagName}`)
